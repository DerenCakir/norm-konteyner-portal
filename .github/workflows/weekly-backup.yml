name: Weekly Supabase backup

# Free-tier Supabase has no automatic backups. We take a logical
# pg_dump every Friday afternoon (after the submission window closes)
# and upload it as a GitHub Actions artifact, retained for 90 days.
# That gives a recovery window of roughly 13 backups per quarter.
#
# A successful run produces an artifact named "supabase-backup-<date>"
# containing a single .sql.gz file. To restore: download the artifact,
# gunzip it, and feed it to psql against a target database.

on:
  schedule:
    # Friday 13:00 Europe/Istanbul = 10:00 UTC. After the 09:00–12:00
    # submission window closes plus a small buffer for late-window edits.
    - cron: "0 10 * * 5"
  workflow_dispatch: {}  # manual trigger for ad-hoc backups

jobs:
  pg-dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client gzip

      - name: Capture backup
        env:
          # pg_dump needs a session-scoped connection, not the transaction
          # pooler the app uses. Add a separate DATABASE_BACKUP_URL secret
          # pointing at the Supabase Session Pooler (Connect → Session
          # Pooler in the Supabase dashboard).
          DATABASE_URL: ${{ secrets.DATABASE_BACKUP_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_BACKUP_URL secret is not set. Use Supabase → Connect → Session Pooler URL and add it under Settings → Secrets → Actions."
            exit 1
          fi
          STAMP=$(date -u +%Y-%m-%d_%H%M)
          OUT="supabase-backup-${STAMP}.sql.gz"
          echo "Dumping to $OUT"
          # --no-owner / --no-privileges keeps the dump portable across
          # Supabase projects; --clean lets a restore drop existing
          # objects before recreating them.
          pg_dump "$DATABASE_URL" \
              --no-owner --no-privileges --clean --if-exists \
              | gzip -9 > "$OUT"
          ls -lh "$OUT"
          echo "BACKUP_FILE=$OUT" >> "$GITHUB_ENV"
          echo "BACKUP_STAMP=$STAMP" >> "$GITHUB_ENV"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.BACKUP_STAMP }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error
